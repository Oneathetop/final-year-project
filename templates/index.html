<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Academic Risk Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <h1>Student Academic Risk Prediction System</h1>

    <div class="container">

        <!-- Input Form -->
        <div class="box">

            <h3>Enter Student Information</h3>

            <label>Study Time</label>
            <input id="studytime" type="number" min="1" max="4">

            <label>Failures</label>
            <input id="failures" type="number" min="0">

            <label>Absences</label>
            <input id="absences" type="number" min="0">

            <button onclick="predictStudent()">Predict Performance</button>

        </div>

        <!-- Results -->
        <div class="box">

            <h3>Prediction Result</h3>

            <div id="result" class="result">
                Waiting for prediction...
            </div>

        </div>

    </div>

    <!-- CSV Upload Section -->
    <div class="box csv-section">

        <h3>Batch Prediction (CSV Upload)</h3>

        <input type="file" id="fileInput" accept=".csv">

        <button onclick="sendCSV()">Predict from CSV</button>

        <div id="csvResult" class="result"></div>

    </div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
